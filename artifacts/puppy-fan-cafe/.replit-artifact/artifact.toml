kind = "web"
previewPath = "/"
title = "강아지 팬카페"
version = "1.0.0"
id = "artifacts/puppy-fan-cafe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21828

[services.development]
run = "pnpm --filter @workspace/puppy-fan-cafe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/puppy-fan-cafe", "run", "build" ]
publicDir = "artifacts/puppy-fan-cafe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21828"
BASE_PATH = "/"
